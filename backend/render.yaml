# One-time deploy config for Render. Push to GitHub, then in Render:
# New -> Blueprint -> pick this repo. It reads this file and provisions the service.
services:
  - type: web
    name: talentos-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false # set in Render dashboard (secret)
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: GROQ_API_KEYS
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: FRONTEND_ORIGIN
        sync: false # your Vercel URL
